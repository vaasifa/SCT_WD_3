<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT_WD_3 - Neon Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>TIC-TAC-TOE</h1>
        
        <div class="status" id="statusText">Player <span class="x-turn">X</span>'s Turn</div>
        
        <div class="board" id="board">
            <div data-cell-index="0" class="cell"></div>
            <div data-cell-index="1" class="cell"></div>
            <div data-cell-index="2" class="cell"></div>
            <div data-cell-index="3" class="cell"></div>
            <div data-cell-index="4" class="cell"></div>
            <div data-cell-index="5" class="cell"></div>
            <div data-cell-index="6" class="cell"></div>
            <div data-cell-index="7" class="cell"></div>
            <div data-cell-index="8" class="cell"></div>
        </div>
        
        <button id="resetBtn" class="control-btn">Reset Game</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="modal">
            <h2 id="winnerText">Player X Wins!</h2>
            <button id="restartBtn" class="control-btn modal-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
